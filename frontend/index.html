<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Panya - PLC Assistant</title>
    <meta
      name="description"
      content="Panya - Your Industrial Automation & PLC Expert AI Assistant"
    />
    <link rel="icon" type="image/svg+xml" href="/assets/panya-mark-v1.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700&family=Syne:wght@500;600;700;800&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700&family=Syne:wght@500;600;700;800&display=swap"
      />
    </noscript>
    <script>
      (() => {
        let theme = "light";
        try {
          theme = localStorage.getItem("theme") === "dark" ? "dark" : "light";
        } catch {
          theme = "light";
        }
        document.documentElement.dataset.theme = theme;
        document.documentElement.style.colorScheme =
          theme === "dark" ? "dark" : "light";
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
